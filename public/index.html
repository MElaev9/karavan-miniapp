<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Караван</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/config.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <nav class="tabs">
    <button class="tab active" data-tab="home">Главная</button>
    <button class="tab" data-tab="new">Новое мероприятие</button>
    <button class="tab" data-tab="dishes">Блюда</button>
    <button class="tab" data-tab="archive">Архив</button>
  </nav>

  <section id="tab-home" class="tab-panel active">
    <div class="hero">
      <svg class="hero-svg" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Караван">
        <defs>
          <filter id="hero-glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <rect width="600" height="180" rx="18" fill="#0a1628"/>
        <circle cx="150" cy="95" r="52" fill="none" stroke="#4fd8ff" stroke-width="3" filter="url(#hero-glow)"/>
        <circle cx="150" cy="95" r="30" fill="none" stroke="#4fd8ff" stroke-width="2" opacity="0.7" filter="url(#hero-glow)"/>
        <g filter="url(#hero-glow)" stroke="#7fe3ff" stroke-width="3" fill="none" stroke-linecap="round">
          <path d="M300 45 L330 95 Q330 115 300 115 Q270 115 270 95 Z"/>
          <line x1="300" y1="115" x2="300" y2="150"/>
          <line x1="278" y1="150" x2="322" y2="150"/>
        </g>
        <g filter="url(#hero-glow)" stroke="#4fd8ff" stroke-width="3" fill="none" stroke-linecap="round">
          <line x1="410" y1="50" x2="410" y2="140"/>
          <path d="M400 50 L400 80 M410 50 L410 80 M420 50 L420 80 M400 80 Q400 90 410 90 Q420 90 420 80"/>
          <path d="M460 50 Q480 50 480 80 Q480 95 465 100 L465 140" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>

    <h3 class="section-title">Ближайшие мероприятия</h3>
    <div id="upcoming-events" class="archive-list"></div>

    <div class="home-nav">
      <button class="home-nav-btn" data-goto="new">➕ Новое мероприятие</button>
      <button class="home-nav-btn" data-goto="dishes">🍽️ Блюда и комбо</button>
      <button class="home-nav-btn" data-goto="archive">📂 Архив</button>
      <button id="sheets-link-btn" class="home-nav-btn">📊 Google Таблица</button>
    </div>
  </section>

  <section id="tab-new" class="tab-panel">
    <div class="field">
      <label for="event-name">Название</label>
      <input id="event-name" type="text" placeholder="Свадьба Ивановых">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="event-guests">Гостей</label>
        <input id="event-guests" type="number" min="1" value="20">
      </div>
      <div class="field">
        <label for="event-date">Дата</label>
        <input id="event-date" type="date">
      </div>
    </div>

    <div id="combo-picker" class="combo-picker"></div>

    <div id="dish-categories" class="categories"></div>

    <div id="calc-result" class="calc-result"></div>
  </section>

  <section id="tab-dishes" class="tab-panel">
    <h3 class="section-title">Комбо</h3>
    <div id="combo-list" class="combo-list"></div>
    <button id="new-combo-btn" class="secondary-btn">+ Новое комбо</button>
    <div id="combo-form" class="combo-form hidden"></div>

    <h3 class="section-title">Каталог блюд</h3>
    <button id="new-dish-btn" class="secondary-btn">+ Новое блюдо</button>
    <div id="dish-form" class="dish-form hidden"></div>
    <div id="dish-list" class="categories"></div>
  </section>

  <section id="tab-archive" class="tab-panel">
    <div id="archive-list" class="archive-list"></div>
    <div id="event-card" class="event-card hidden"></div>
  </section>
</div>

<script src="/app.js"></script>
</body>
</html>
