<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Караван</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <section id="tab-home" class="tab-panel active">
    <div class="hero">
      <svg class="hero-img" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Караван — банкетный зал">
        <defs>
          <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3f0f18"/>
            <stop offset="55%" stop-color="#260f14"/>
            <stop offset="100%" stop-color="#150b0d"/>
          </linearGradient>
          <radialGradient id="heroGlow" cx="50%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#6f2030" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#6f2030" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="1200" height="420" fill="url(#heroBg)"/>
        <rect width="1200" height="420" fill="url(#heroGlow)"/>
        <rect x="14" y="14" width="1172" height="392" fill="none" stroke="#c9a463" stroke-opacity="0.35" stroke-width="1.5"/>

        <line x1="430" y1="168" x2="560" y2="168" stroke="#c9a463" stroke-width="1.5"/>
        <rect x="595" y="162" width="12" height="12" fill="#c9a463" transform="rotate(45 601 168)"/>
        <line x1="640" y1="168" x2="770" y2="168" stroke="#c9a463" stroke-width="1.5"/>

        <text x="600" y="248" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="86" letter-spacing="10" fill="#e3c890">КАРАВАН</text>

        <line x1="470" y1="286" x2="730" y2="286" stroke="#c9a463" stroke-opacity="0.6" stroke-width="1"/>
        <text x="600" y="318" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="500" font-size="22" letter-spacing="6" fill="#c9a463">БАНКЕТНЫЙ ЗАЛ</text>
        <line x1="470" y1="336" x2="730" y2="336" stroke="#c9a463" stroke-opacity="0.6" stroke-width="1"/>
      </svg>
    </div>

    <h3 class="section-title">Ближайшие мероприятия</h3>
    <div id="upcoming-events" class="archive-list"></div>

    <div class="home-nav">
      <button class="home-nav-btn" data-goto="new">➕ Новое мероприятие</button>
      <button class="home-nav-btn" data-goto="dishes">🍽️ Блюда и комбо</button>
      <button class="home-nav-btn" data-goto="archive">📂 Архив</button>
      <button id="sheets-link-btn" class="home-nav-btn">📊 Google Таблица</button>
    </div>
  </section>

  <section id="tab-new" class="tab-panel">
    <div class="field">
      <label for="event-name">Название</label>
      <input id="event-name" type="text" placeholder="Свадьба Ивановых">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="event-guests">Гостей</label>
        <input id="event-guests" type="number" min="1" value="20">
      </div>
      <div class="field">
        <label for="event-date">Дата</label>
        <input id="event-date" type="date">
      </div>
    </div>

    <div id="combo-picker" class="combo-picker"></div>

    <div id="dish-categories" class="categories"></div>

    <div id="calc-result" class="calc-result"></div>
  </section>

  <section id="tab-dishes" class="tab-panel">
    <h3 class="section-title">Комбо</h3>
    <div id="combo-list" class="combo-list"></div>
    <button id="new-combo-btn" class="secondary-btn">+ Новое комбо</button>
    <div id="combo-form" class="combo-form hidden"></div>

    <h3 class="section-title">Каталог блюд</h3>
    <button id="new-dish-btn" class="secondary-btn">+ Новое блюдо</button>
    <div id="dish-form" class="dish-form hidden"></div>
    <div id="dish-list" class="categories"></div>
  </section>

  <section id="tab-archive" class="tab-panel">
    <input id="archive-search" class="form-input" type="text" placeholder="Поиск по названию">
    <div id="archive-list" class="archive-list"></div>
    <div id="event-card" class="event-card hidden"></div>
  </section>

  <section id="tab-calendar" class="tab-panel">
    <div class="calendar-header">
      <button id="cal-prev" class="secondary-btn cal-nav-btn">‹</button>
      <h3 id="cal-title" class="section-title"></h3>
      <button id="cal-next" class="secondary-btn cal-nav-btn">›</button>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
    <div id="calendar-day-events"></div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="home">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg></span>
      <span class="tab-label">Главная</span>
    </button>
    <button class="tab" data-tab="new">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg></span>
      <span class="tab-label">Новое</span>
    </button>
    <button class="tab" data-tab="dishes">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v6a2 2 0 004 0V2"/><path d="M8 8v14"/><path d="M17 2c1.8 0 3 2 3 6s-1.2 6-3 6"/><path d="M17 14v6"/></svg></span>
      <span class="tab-label">Блюда</span>
    </button>
    <button class="tab" data-tab="calendar">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
      <span class="tab-label">Календарь</span>
    </button>
    <button class="tab" data-tab="archive">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l2-3h14l2 3"/><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M9 12h6"/></svg></span>
      <span class="tab-label">Архив</span>
    </button>
  </nav>
</div>

<script src="/app.js"></script>
</body>
</html>
